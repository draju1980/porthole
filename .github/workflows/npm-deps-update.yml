name: npm Dependency Update

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install current dependencies
        run: npm ci

      - name: Check for outdated packages
        id: check-outdated
        run: |
          echo "=== Outdated packages ==="
          npm outdated || true

      - name: Update all dependencies
        id: update
        run: |
          echo "=== Updating dependencies ==="
          npx npm-check-updates -u --target latest 2>&1 | tee /tmp/ncu-output.log
          npm install

          echo "=== Checking for changes ==="
          cd ..
          if git diff --quiet npm/package.json npm/package-lock.json; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "No dependency changes detected"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "Dependencies updated"
            echo ""
            echo "=== Changes ==="
            git diff npm/package.json
          fi

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify no outdated packages remain
        run: |
          echo "=== Final outdated check ==="
          npm outdated || true

      - name: Create Pull Request
        if: steps.update.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(npm): update dependencies"
          title: "chore(npm): weekly dependency update"
          body: |
            ## Summary
            - Automated weekly dependency update for the npm package
            - Build and all tests pass after the update

            ## Changes
            ```
            ${{ steps.check-outdated.outputs.stdout || 'See CI logs for details' }}
            ```

            ## Test plan
            - [x] `npm run build` passed in CI
            - [x] `npm test` passed in CI
            - [ ] Manual smoke test (optional)
          branch: chore/npm-deps-update
          delete-branch: true
          labels: dependencies, npm
